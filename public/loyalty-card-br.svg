<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="600" height="380" rx="20" fill="url(#bg)"/>

  <!-- Top accent bar -->
  <rect y="0" width="600" height="6" rx="3" fill="url(#accent)"/>

  <!-- Gear icon -->
  <g transform="translate(40, 30) scale(0.6)" fill="#3b82f6" opacity="0.15">
    <path d="M100 20 L110 0 L130 0 L140 20 L160 30 L160 50 L140 60 L130 80 L110 80 L100 60 L80 50 L80 30 Z"/>
    <circle cx="120" cy="40" r="18" fill="#0f172a"/>
  </g>

  <!-- Business name -->
  <text x="40" y="75" font-family="Arial Black, sans-serif" font-weight="900" font-size="22" fill="#ffffff" letter-spacing="1">
    CENTRO AUTOMOTRIZ
  </text>
  <text x="380" y="75" font-family="Arial Black, sans-serif" font-weight="900" font-size="28" fill="#3b82f6" letter-spacing="1">
    BR
  </text>

  <!-- Divider -->
  <rect x="40" y="90" width="520" height="1" fill="#3b82f6" opacity="0.3"/>

  <!-- Title -->
  <text x="300" y="130" font-family="Arial, sans-serif" font-weight="700" font-size="20" fill="#3b82f6" text-anchor="middle" letter-spacing="3">
    TARJETA DE LEALTAD
  </text>
  <text x="300" y="152" font-family="Arial, sans-serif" font-weight="400" font-size="13" fill="#94a3b8" text-anchor="middle" letter-spacing="1">
    LOYALTY CARD
  </text>

  <!-- Stamp circles - 2 rows of 5 -->
  <g transform="translate(75, 175)">
    <!-- Row 1 -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">1</text>

    <circle cx="90" cy="0" r="28" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="90" y="5" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">2</text>

    <circle cx="180" cy="0" r="28" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="180" y="5" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">3</text>

    <circle cx="270" cy="0" r="28" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="270" y="5" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">4</text>

    <circle cx="360" cy="0" r="28" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="360" y="5" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">5</text>

    <!-- Row 2 -->
    <circle cx="0" cy="75" r="28" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">6</text>

    <circle cx="90" cy="75" r="28" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="90" y="80" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">7</text>

    <circle cx="180" cy="75" r="28" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="180" y="80" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">8</text>

    <circle cx="270" cy="75" r="28" fill="none" stroke="#3b82f6" stroke-width="2" stroke-dasharray="4 3"/>
    <text x="270" y="80" font-family="Arial, sans-serif" font-size="11" fill="#475569" text-anchor="middle">9</text>

    <!-- 10th - FREE -->
    <circle cx="360" cy="75" r="28" fill="#3b82f6" opacity="0.2"/>
    <circle cx="360" cy="75" r="28" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
    <text x="360" y="72" font-family="Arial, sans-serif" font-weight="700" font-size="10" fill="#3b82f6" text-anchor="middle">FREE</text>
    <text x="360" y="85" font-family="Arial, sans-serif" font-weight="700" font-size="9" fill="#60a5fa" text-anchor="middle">GRATIS</text>
  </g>

  <!-- Bottom text -->
  <text x="300" y="340" font-family="Arial, sans-serif" font-weight="600" font-size="12" fill="#60a5fa" text-anchor="middle" letter-spacing="1">
    10TH VISIT FREE OIL CHANGE
  </text>
  <text x="300" y="360" font-family="Arial, sans-serif" font-weight="400" font-size="11" fill="#64748b" text-anchor="middle">
    (408) 690-9455 &#x2022; centroautomotrizbr.com
  </text>
</svg>
